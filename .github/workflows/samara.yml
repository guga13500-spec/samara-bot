name: Jarvis Bot - 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-jarvis:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup + Import + Rodar Jarvis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -e
          # Instalar ferramentas
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full
          pip install -q requests teamtalk.py

          # Descobrir onde o teamtalk.py foi instalado
          TT_DIR=$(python3 -c "import site; sp=site.getsitepackages(); print([p for p in sp if 'site-packages' in p][0])")/teamtalk
          echo "📁 $TT_DIR"

          # Baixar SDK
          curl -s -o /tmp/ttsdk.7z "https://www.bearware.dk/teamtalksdk/v5.22a/tt5sdk_v5.22a_ubuntu22_x86_64.7z"

          # Extrair
          7z x -y /tmp/ttsdk.7z -o/tmp/ttsdk_extracted > /dev/null 2>&1

          # Copiar pro lugar certo
          FOUND_PY=$(find /tmp/ttsdk_extracted -type d -name "TeamTalkPy" | head -1)
          FOUND_DLL=$(find /tmp/ttsdk_extracted -type d -name "TeamTalk_DLL" | head -1)
          rm -rf "$TT_DIR/implementation"
          mkdir -p "$TT_DIR/implementation"
          cp -r "$FOUND_PY" "$TT_DIR/implementation/TeamTalkPy"
          cp -r "$FOUND_DLL" "$TT_DIR/implementation/TeamTalk_DLL"
          touch "$TT_DIR/implementation/__init__.py"
          rm -rf "$TT_DIR/implementation/TeamTalkPy/test"

          # Configurar LD_LIBRARY_PATH
          export LD_LIBRARY_PATH="$TT_DIR/implementation/TeamTalk_DLL:$LD_LIBRARY_PATH"
          echo "✅ LD_LIBRARY_PATH: $LD_LIBRARY_PATH"

          # Testar
          python3 -c "
import os
os.environ['LD_LIBRARY_PATH'] = '$TT_DIR/implementation/TeamTalk_DLL'
import ctypes
ctypes.cdll.LoadLibrary('$TT_DIR/implementation/TeamTalk_DLL/libTeamTalk5.so')
from teamtalk import TeamTalkBot
from teamtalk.enums import TeamTalkServerInfo
print('✅ Import OK!')
          "

          # Rodar
          echo "🚀 Rodando Jarvis..."
          python samara_bot.py
