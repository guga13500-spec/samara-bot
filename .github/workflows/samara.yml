name: Jarvis
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Tudo
        run: |
          set -e
          echo "=== APT ==="
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full
          echo "=== PIP ==="
          pip install -q requests teamtalk.py
          echo "=== SDK ==="
          TD=$(python3 -c "import site;print(site.getsitepackages()[0])")/teamtalk
          curl -s -o /tmp/s.7z "https://www.bearware.dk/teamtalksdk/v5.22a/tt5sdk_v5.22a_ubuntu22_x86_64.7z"
          7z x -y /tmp/s.7z -o/tmp/x > /dev/null 2>&1
          PY=$(find /tmp/x -type d -name TeamTalkPy | head -1)
          DL=$(find /tmp/x -type d -name TeamTalk_DLL | head -1)
          rm -rf "$TD/implementation"
          mkdir -p "$TD/implementation"
          cp -r "$PY" "$TD/implementation/TeamTalkPy"
          cp -r "$DL" "$TD/implementation/TeamTalk_DLL"
          touch "$TD/implementation/__init__.py"
          export SP="$TD/implementation/TeamTalk_DLL"
          echo "=== TESTE ==="
          export LD_LIBRARY_PATH="$SP"
          python3 -c "import os, ctypes, sys; sp='$SP'; os.environ['LD_LIBRARY_PATH']=sp; lib=sp+'/libTeamTalk5.so'; print('lib exists:', os.path.exists(lib)); ctypes.cdll.LoadLibrary(lib); from teamtalk import TeamTalkBot; from teamtalk.enums import TeamTalkServerInfo; print('OK!')"