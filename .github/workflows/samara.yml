name: Jarvis Bot - 24/7

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-jarvis:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full
          pip install requests teamtalk.py
      - name: Configurar SDK TeamTalk
        run: |
          python setup_jarvis.py
      - name: Testar import
        run: |
          python3 -c "from teamtalk import TeamTalkBot, TeamTalkServerInfo; print('✅ Import OK!')"
      - name: Rodar Jarvis (24h)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python samara_bot.py
