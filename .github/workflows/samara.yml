name: Jarvis
on: [push, workflow_dispatch]
jobs:
  jarvis:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup
        run: |-
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full
          pip install -q requests teamtalk.py
          TD=$(python3 -c "import site;print(site.getsitepackages()[0])")/teamtalk
          curl -s -o /tmp/s.7z "https://www.bearware.dk/teamtalksdk/v5.22a/tt5sdk_v5.22a_ubuntu22_x86_64.7z"
          7z x -y /tmp/s.7z -o/tmp/x > /dev/null 2>&1
          PY=$(find /tmp/x -type d -name TeamTalkPy | head -1)
          DL=$(find /tmp/x -type d -name TeamTalk_DLL | head -1)
          rm -rf $TD/implementation
          mkdir -p $TD/implementation
          cp -r $PY $TD/implementation/TeamTalkPy
          cp -r $DL $TD/implementation/TeamTalk_DLL
          touch $TD/implementation/__init__.py
          echo $TD/implementation/TeamTalk_DLL > /tmp/sp.txt
      - name: Teste
        run: |-
          export SP=$(cat /tmp/sp.txt)
          export LD_LIBRARY_PATH=$SP
          python3 -c "import os,ctypes;os.environ['LD_LIBRARY_PATH']='$SP';ctypes.cdll.LoadLibrary('$SP/libTeamTalk5.so');from teamtalk import TeamTalkBot;from teamtalk.enums import TeamTalkServerInfo;print('OK!')"
      - name: Jarvis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |-
          export SP=$(cat /tmp/sp.txt)
          export LD_LIBRARY_PATH=$SP
          python3 samara_bot.py